name: Terraform Destroy (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - preprod
          - prod
      confirm:
        description: 'Type the environment name exactly (e.g. "preprod" or "prod") to confirm destroy'
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-confirmation:
    name: Validate Confirmation Input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation matches environment
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "${{ github.event.inputs.environment }}" ]; then
            echo "::error::Confirmation input '${{ github.event.inputs.confirm }}' does not match selected environment '${{ github.event.inputs.environment }}'. Aborting destroy."
            exit 1
          fi
          echo "Confirmation matches. Proceeding with destroy of '${{ github.event.inputs.environment }}'."

  destroy-preprod:
    name: Destroy (preprod)
    needs: validate-confirmation
    if: github.event.inputs.environment == 'preprod'
    runs-on: ubuntu-latest
    environment: preprod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_databricks_account_id: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_ID }}
      TF_VAR_databricks_account_client_id: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_CLIENT_ID }}
      TF_VAR_databricks_account_client_secret: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_CLIENT_SECRET }}
    defaults:
      run:
        working-directory: environments/preprod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false

  destroy-prod:
    name: Destroy (prod)
    needs: validate-confirmation
    if: github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_databricks_account_id: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_ID }}
      TF_VAR_databricks_account_client_id: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_CLIENT_ID }}
      TF_VAR_databricks_account_client_secret: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_CLIENT_SECRET }}
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
