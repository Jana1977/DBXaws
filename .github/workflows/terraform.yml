name: Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - "environments/preprod/**"
      - "environments/prod/**"
      - "modules/**"
  push:
    branches:
      - main
    paths:
      - "environments/preprod/**"
      - "environments/prod/**"
      - "modules/**"

permissions:
  contents: read
  pull-requests: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_databricks_account_id: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_ID }}

jobs:
  detect-changes:
    name: Detect Changed Environments
    runs-on: ubuntu-latest
    outputs:
      preprod: ${{ steps.filter.outputs.preprod }}
      prod: ${{ steps.filter.outputs.prod }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            preprod:
              - 'environments/preprod/**'
              - 'modules/**'
            prod:
              - 'environments/prod/**'
              - 'modules/**'

  plan-preprod:
    name: Plan (preprod)
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.preprod == 'true'
    runs-on: ubuntu-latest
    env:
      TF_VAR_databricks_account_client_id: ${{ secrets.PREPROD_DATABRICKS_CLIENT_ID }}
      TF_VAR_databricks_account_client_secret: ${{ secrets.PREPROD_DATABRICKS_CLIENT_SECRET }}
    defaults:
      run:
        working-directory: environments/preprod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}${{ steps.plan.outputs.stderr }}"
        with:
          script: |
            const output = `#### Terraform Plan for \`preprod\` 📖
            \`\`\`
            ${process.env.PLAN}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  plan-prod:
    name: Plan (prod)
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.prod == 'true'
    runs-on: ubuntu-latest
    env:
      TF_VAR_databricks_account_client_id: ${{ secrets.PROD_DATABRICKS_CLIENT_ID }}
      TF_VAR_databricks_account_client_secret: ${{ secrets.PROD_DATABRICKS_CLIENT_SECRET }}
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}${{ steps.plan.outputs.stderr }}"
        with:
          script: |
            const output = `#### Terraform Plan for \`prod\` 📖
            \`\`\`
            ${process.env.PLAN}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply-preprod:
    name: Apply (preprod)
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.preprod == 'true'
    runs-on: ubuntu-latest
    environment: preprod
    env:
      TF_VAR_databricks_account_client_id: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_CLIENT_ID }}
      TF_VAR_databricks_account_client_secret: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_CLIENT_SECRET }}
    defaults:
      run:
        working-directory: environments/preprod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

  apply-prod:
    name: Apply (prod)
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.prod == 'true'
    runs-on: ubuntu-latest
    environment: prod
    env:
      TF_VAR_databricks_account_client_id: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_CLIENT_ID }}
      TF_VAR_databricks_account_client_secret: ${{ secrets.TF_VAR_DATABRICKS_ACCOUNT_CLIENT_SECRET }}
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
